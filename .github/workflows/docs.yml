name: Docs

on:
  pull_request:
    paths:
      - '.github/workflows/docs.yml'
      - '.nvmrc'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'docs/**'
      - 'docusaurus.config.ts'
      - 'package-lock.json'
      - 'package.json'
      - 'sidebars.ts'
      - 'src/**'
      - 'static/**'
      - 'tsconfig.json'
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build docs site
        run: npm run build
